<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA726;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Clean circular background -->
  <circle cx="24" cy="24" r="23" fill="url(#iconGrad)"/>

  <!-- Stylized letter "A" with shopping bag -->
  <g transform="translate(24, 24)">
    <!-- Left part of A -->
    <path d="M -12 10 L -5 -12 L -2 -12 L -7 10 Z" fill="#FFFFFF" opacity="0.95"/>

    <!-- Right part of A -->
    <path d="M 2 -12 L 5 -12 L 12 10 L 7 10 Z" fill="#FFFFFF" opacity="0.95"/>

    <!-- Middle bar -->
    <path d="M -4 0 L 4 0 L 4 4 L -4 4 Z" fill="#FFFFFF" opacity="0.95"/>

    <!-- Shopping bag integrated -->
    <rect x="-2.5" y="-2" width="5" height="6" rx="0.5" fill="none" stroke="#FF6B35" stroke-width="1.2"/>
    <path d="M -1 -2 Q -1 -4 0 -4 Q 1 -4 1 -2" fill="none" stroke="#FF6B35" stroke-width="1.2"/>
  </g>
</svg>
