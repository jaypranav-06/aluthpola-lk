<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA726;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Clean circular background -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)"/>

  <!-- Stylized letter "A" formed by abstract shapes -->
  <g transform="translate(100, 100)">
    <!-- Left part of A - representing marketplace/building -->
    <path d="M -35 30 L -15 -35 L -5 -35 L -20 30 Z" fill="#FFFFFF" opacity="0.95"/>

    <!-- Right part of A -->
    <path d="M 5 -35 L 15 -35 L 35 30 L 20 30 Z" fill="#FFFFFF" opacity="0.95"/>

    <!-- Middle bar with shopping bag cutout -->
    <path d="M -10 0 L 10 0 L 12 10 L -12 10 Z" fill="#FFFFFF" opacity="0.95"/>

    <!-- Shopping bag icon integrated into the A -->
    <rect x="-6" y="-5" width="12" height="15" rx="1" fill="none" stroke="#FF6B35" stroke-width="2"/>
    <path d="M -3 -5 Q -3 -10 0 -10 Q 3 -10 3 -5" fill="none" stroke="#FF6B35" stroke-width="2"/>
  </g>

  <!-- Decorative dots representing Sri Lankan market diversity -->
  <circle cx="50" cy="100" r="4" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="150" cy="100" r="4" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="100" cy="50" r="4" fill="#FFFFFF" opacity="0.3"/>

  <!-- Modern text badge -->
  <rect x="30" y="155" width="140" height="32" fill="#FFFFFF" rx="16"/>
  <text x="100" y="177" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FF6B35" text-anchor="middle">Aluthpola.lk</text>
</svg>
